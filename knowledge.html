<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Knowledge Vault | Facts Fusion</title>

    <link rel="stylesheet" href="knowledge.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>

        <h1>FACTS FUSION</h1>

        <nav>

            <a href="../index.html">Home</a>
            <a href="#">Knowledge Vault</a>

        </nav>

    </header>



    <section class="hero">

        <h2>Knowledge Vault</h2>

        <p>
            Search hundreds of amazing facts from Space, AI, Science,
            Technology, Animals and History.
        </p>

    </section>



    <!-- SEARCH -->

    <section class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Search amazing facts...">

    </section>




    <!-- CATEGORY BUTTONS -->

    <section class="categories">

        <button class="active">All</button>

        <button>Space</button>

        <button>AI</button>

        <button>Science</button>

        <button>Technology</button>

        <button>Animals</button>

        <button>History</button>

    </section>




    <!-- FACTS -->

    <section class="facts-grid" id="factsContainer">




    </section>



<script src="../data/facts.js"></script>
<script src="knowledge.js"></script>

</html>
